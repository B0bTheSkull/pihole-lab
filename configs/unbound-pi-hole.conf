# /etc/unbound/unbound.conf.d/pi-hole.conf
#
# Recursive DNS resolver for Pi-hole. Listens on 127.0.0.1:5335 only —
# Pi-hole forwards queries here when they're not blocked.
#
# Why this exists: with unbound running locally, our DNS resolution does
# not depend on Cloudflare/Google/etc. unbound walks the DNS tree itself
# starting from the root servers. This means no third party has a
# complete log of our queries, and we have no single upstream provider
# to fail.

server:
    # Quiet logs
    verbosity: 0

    # Listen on loopback only — Pi-hole is the only client
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no

    # Recursion roots
    root-hints: "/var/lib/unbound/root.hints"

    # DNSSEC validation — auto-trust-anchor-file is set by Debian's
    # /etc/unbound/unbound.conf.d/root-auto-trust-anchor-file.conf;
    # don't redeclare it here or the validator module fails to init.
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes

    # Reduce DNS amplification surface
    use-caps-for-id: no
    edns-buffer-size: 1232

    # Caching (seconds)
    cache-max-ttl: 86400
    cache-min-ttl: 300

    # Speed: prefetch popular items before they expire
    prefetch: yes
    prefetch-key: yes

    # Privacy: send only the necessary part of the query name to upstream nameservers
    qname-minimisation: yes
    aggressive-nsec: yes

    # Don't return RFC1918 / loopback addresses for public domains (DNS rebinding protection)
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
    private-address: 127.0.0.0/8
    private-address: ::1/128
