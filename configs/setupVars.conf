# /etc/pihole/setupVars.conf
#
# Pi-hole unattended-install seed config.
#
# Copy this to /etc/pihole/setupVars.conf BEFORE running the installer
# in --unattended mode. The web admin password is intentionally NOT in
# this file — set it post-install with `pihole -a -p <password>` so it
# never lands in version control.

PIHOLE_INTERFACE=eth0
IPV4_ADDRESS=10.0.0.163/24
IPV6_ADDRESS=

# Upstream DNS:
#   Primary  = local unbound (recursive, no third-party dependency)
#   Fallback = Cloudflare 1.1.1.1 (only used if unbound is unreachable)
PIHOLE_DNS_1=127.0.0.1#5335
PIHOLE_DNS_2=1.1.1.1

# Logging + caching
QUERY_LOGGING=true
CACHE_SIZE=10000

# Web admin
INSTALL_WEB_SERVER=true
INSTALL_WEB_INTERFACE=true
LIGHTTPD_ENABLED=true

# Hardening
DNS_FQDN_REQUIRED=true
DNS_BOGUS_PRIV=true
DNSMASQ_LISTENING=local

# Blocking on by default
BLOCKING_ENABLED=true

# DNSSEC handled by unbound — don't double-validate at Pi-hole layer
DNSSEC=false
