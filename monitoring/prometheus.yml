global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: pihole
    static_configs:
      - targets:
          - pihole-exporter:9617
        labels:
          instance: pihole-prod

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
